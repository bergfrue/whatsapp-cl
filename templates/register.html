<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Clone - Register</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111B21;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #202C33; border-radius: 16px;
    padding: 48px 40px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #25D366, #128C7E);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 16px;
  }
  h1 { color: #E9EDEF; font-size: 24px; font-weight: 600; }
  .subtitle { color: #8696A0; font-size: 14px; margin-top: 4px; }
  label { display: block; color: #8696A0; font-size: 13px; margin-bottom: 6px; margin-top: 20px; }
  input[type=text], input[type=password] {
    width: 100%; padding: 12px 14px;
    background: #2A3942; border: 1px solid #3B4A54;
    border-radius: 8px; color: #E9EDEF; font-size: 15px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #25D366; }
  input::placeholder { color: #8696A0; }
  .emoji-grid {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
  }
  .emoji-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: #2A3942; border: 2px solid transparent;
    cursor: pointer; font-size: 20px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .emoji-btn:hover { border-color: #25D366; transform: scale(1.1); }
  .emoji-btn.selected { border-color: #25D366; background: #1a3a2a; }
  .btn {
    display: block; width: 100%; margin-top: 28px;
    padding: 13px; background: #25D366;
    color: #111B21; font-size: 16px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #20c05a; transform: translateY(-1px); }
  .error {
    background: rgba(234,0,56,0.15); border: 1px solid rgba(234,0,56,0.4);
    color: #EA0038; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; margin-top: 16px;
  }
  .footer { text-align: center; margin-top: 24px; color: #8696A0; font-size: 14px; }
  .footer a { color: #25D366; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <h1>Create Account</h1>
    <p class="subtitle">Join WhatsApp Clone</p>
  </div>

  <form method="POST">
    <label>Choose your avatar</label>
    <div class="emoji-grid">
      {% for em in ['😊','🧑‍💻','🎸','📚','⚽','🎨','🚀','🦊','🐱','🎯','🌟','🔥','💎','🎭','🦁','🐼'] %}
      <button type="button" class="emoji-btn {% if em == '😊' %}selected{% endif %}"
        onclick="selectEmoji(this,'{{em}}')">{{em}}</button>
      {% endfor %}
    </div>
    <input type="hidden" name="avatar" id="avatarInput" value="😊">

    <label>Username</label>
    <input type="text" name="username" placeholder="Pick a username" required autofocus minlength="3">

    <label>Password</label>
    <input type="password" name="password" placeholder="Create a password" required minlength="4">

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <button class="btn" type="submit">Create Account</button>
  </form>

  <div class="footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>
<script>
function selectEmoji(btn, em) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('avatarInput').value = em;
}
</script>
</body>
</html>
